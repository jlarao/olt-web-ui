<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NOC — Monitoreo ONUs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #topbar {
            height: 48px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }
        #topbar a { color: #adb5bd; text-decoration: none; font-size: 0.85rem; }
        #topbar a:hover { color: #fff; }
        #topbar .title { color: #fff; font-weight: 600; font-size: 0.95rem; margin-right: auto; }
        #topbar .badge-port {
            background: #0d6efd;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        #frame-wrapper { height: calc(100vh - 48px); position: relative; }
        #noc-frame { width: 100%; height: 100%; border: none; }
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }
        #loading-overlay.hidden { display: none; }
    </style>
</head>
<body>

<div id="topbar">
    <span class="title">📡 NOC — Monitoreo ONUs</span>
    <span class="badge-port">:{{ port }}</span>
    <a href="/dashboard">← Panel principal</a>
    <a href="{{ streamlit_url }}" target="_blank" title="Abrir en pestaña nueva">↗ Nueva pestaña</a>
</div>

<div id="frame-wrapper">
    <div id="loading-overlay">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted mb-0">Iniciando dashboard NOC…</p>
        <small class="text-muted">Si no carga en 15 segundos, <a href="{{ streamlit_url }}" target="_blank">ábrelo aquí</a>.</small>
    </div>
    <iframe
        id="noc-frame"
        src="{{ streamlit_url }}"
        title="NOC Dashboard"
        allow="fullscreen"
        onload="document.getElementById('loading-overlay').classList.add('hidden')"
    ></iframe>
</div>

<script>
    // Si el iframe falla (p.ej. certificado no aceptado), redirigir a pestaña externa
    const frame = document.getElementById('noc-frame');
    const overlay = document.getElementById('loading-overlay');
    const streamlitUrl = "{{ streamlit_url }}";

    // Timeout: si después de 20s sigue el overlay, mostrar botón de apertura manual
    setTimeout(() => {
        if (!overlay.classList.contains('hidden')) {
            overlay.innerHTML = `
                <p class="text-muted">El dashboard tardó en responder.</p>
                <a href="${streamlitUrl}" target="_blank" class="btn btn-primary">
                    Abrir NOC en nueva pestaña
                </a>
                <a href="/dashboard" class="btn btn-outline-secondary btn-sm mt-2">
                    ← Volver al panel
                </a>`;
        }
    }, 20000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Fibra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.css') }}">
    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/popper.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <h4 class="mb-4">Agregar registro de fibra</h4>

    <div id="alert-box" class="d-none"></div>

    <form id="fibra-form">
        <div class="mb-3">
            <label class="form-label">Hoja</label>
            <select class="form-select" name="sheet" required>
                <option value="cuentas fibra">Cuentas Fibra</option>
                <option value="cuentas fibra ma">Cuentas Fibra MA</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" name="name" placeholder="Nombre del cliente" required>
        </div>

        <div class="mb-3">
            <label class="form-label">SN</label>
            <input type="text" class="form-control" name="sn" placeholder="Número de serie ONT" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Puerto</label>
            <select class="form-select" name="port" required>
                <option value="port 0">Port 0</option>
                <option value="port 1">Port 1</option>
                <option value="port 2">Port 2</option>
                <option value="port 3">Port 3</option>
                <option value="port 4">Port 4</option>
                <option value="port 5">Port 5</option>
                <option value="port 6">Port 6</option>
                <option value="port 7">Port 7</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="submit-btn">Agregar</button>
    </form>

    <div class="mt-3">
        <a href="/dashboard">← Dashboard</a>
    </div>
</div>

<script>
$('#fibra-form').on('submit', function(e) {
    e.preventDefault();

    const btn = $('#submit-btn');
    btn.prop('disabled', true).text('Enviando...');
    $('#alert-box').addClass('d-none').text('');

    const payload = {
        sheet: $('[name="sheet"]').val(),
        name:  $('[name="name"]').val().trim(),
        sn:    $('[name="sn"]').val().trim(),
        port:  $('[name="port"]').val()
    };

    $.ajax({
        url: '/api/agregar-fibra',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(payload),
        success: function(res) {
            showAlert('success', res.message || 'Registro agregado correctamente.');
            $('#fibra-form')[0].reset();
        },
        error: function(xhr) {
            const msg = (xhr.responseJSON && xhr.responseJSON.error) || 'Error al agregar el registro.';
            showAlert('danger', msg);
        },
        complete: function() {
            btn.prop('disabled', false).text('Agregar');
        }
    });
});

function showAlert(type, msg) {
    $('#alert-box')
        .removeClass('d-none alert-success alert-danger')
        .addClass('alert alert-' + type)
        .text(msg);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar cliente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Editar cliente: {{ cliente.nombre }} {{ cliente.apellidos }}</h4>
        <a href="/clientes" class="btn btn-sm btn-outline-secondary">← Clientes</a>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-info alert-dismissible fade show py-2" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card">
        <div class="card-body">
            <form method="POST" action="/clientes/editar/{{ cliente.id }}">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="nombre" required value="{{ cliente.nombre }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Apellidos</label>
                        <input type="text" class="form-control" name="apellidos" value="{{ cliente.apellidos }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Dirección</label>
                        <input type="text" class="form-control" name="direccion" value="{{ cliente.direccion }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Localidad</label>
                        <input type="text" class="form-control" name="localidad" value="{{ cliente.localidad }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Coordenadas</label>
                        <input type="text" class="form-control" name="coordenadas" value="{{ cliente.coordenadas }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Número celular</label>
                        <input type="text" class="form-control" name="numero_celular" value="{{ cliente.numero_celular }}">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="tiene_whatsapp" name="tiene_whatsapp"
                                   {{ 'checked' if cliente.tiene_whatsapp }}>
                            <label class="form-check-label" for="tiene_whatsapp">Tiene WhatsApp</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Usuario de conexión <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="user_name" required value="{{ cliente.user_name }}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Tipo de conexión</label>
                        <select class="form-select" name="tipo_conexion">
                            <option value="pppoe" {{ 'selected' if cliente.tipo_conexion == 'pppoe' }}>PPPoE</option>
                            <option value="hotspot" {{ 'selected' if cliente.tipo_conexion == 'hotspot' }}>Hotspot</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Plan</label>
                        <select class="form-select" name="plan_id">
                            <option value="">— Sin asignar —</option>
                            {% for p in planes %}
                            <option value="{{ p.id }}" {{ 'selected' if cliente.plan_id == p.id }}>{{ p.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
